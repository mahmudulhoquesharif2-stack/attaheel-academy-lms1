name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - master # master ব্রাঞ্চে পরিবর্তন হলেই এটি রান করবে

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Project
        run: |
          cd frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist # Vite-এর বিল্ড ফোল্ডার
          branch: gh-pages # এই ব্রাঞ্চে ফাইল জমা হবে
