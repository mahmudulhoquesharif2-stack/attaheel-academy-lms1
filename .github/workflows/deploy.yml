name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - master # আপনার প্রজেক্টের মূল ব্রাঞ্চ master হওয়ায় এটি কাজ করবে

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Project
        run: |
          cd frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist # Vite বিল্ড ফোল্ডার
          branch: gh-pages # এই ব্রাঞ্চে অটোমেটিক ফাইল জমা হবে
